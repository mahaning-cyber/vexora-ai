<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VEXORA AI</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#ffffff;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.container{
width:100%;
max-width:700px;
}

.logo{
text-align:center;
font-size:32px;
font-weight:800;
margin-bottom:10px;
}

.sub{
text-align:center;
color:#666;
margin-bottom:30px;
}

.chatbox{
background:#fff;
border:1px solid #e4e4e4;
border-radius:24px;
padding:15px;
box-shadow:0 8px 30px rgba(0,0,0,.08);
}

textarea{
width:100%;
border:none;
outline:none;
resize:none;
min-height:80px;
font-size:16px;
padding:10px;
}

.bottom{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:10px;
}

.upload-btn{
width:48px;
height:48px;
border:none;
border-radius:50%;
background:#f3f4f6;
font-size:24px;
cursor:pointer;
}

.generate-btn{
border:none;
padding:12px 22px;
border-radius:14px;
background:#2563eb;
color:white;
font-weight:bold;
cursor:pointer;
}

.preview{
display:none;
margin-top:15px;
}

.preview img{
width:100%;
max-height:250px;
object-fit:cover;
border-radius:16px;
}

.footer{
text-align:center;
margin-top:20px;
color:#777;
font-size:13px;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">VEXORA AI</div>

<div class="sub">
Create realistic AI videos from photos
</div>

<div class="chatbox">

<textarea id="prompt" placeholder="Describe your video..."></textarea>

<input type="file" id="fileInput" hidden accept="image/*">

<button class="upload-btn"
onclick="document.getElementById('fileInput').click()">
+
</button>
</div>

<button class="generate-btn" id="generateBtn">
Generate
</button>

</div>

<div class="preview" id="preview">
<img id="previewImg">
</div>

</div>

<div class="footer">
VEXORA AI Video Generator
</div>

</div>

<script>

const fileInput = document.getElementById("fileInput");
const preview = document.getElementById("preview");
const previewImg = document.getElementById("previewImg");
const generateBtn = document.getElementById("generateBtn");

fileInput.addEventListener("change", function(){

const file = this.files[0];

if(!file) return;

preview.style.display = "block";
previewImg.src = URL.createObjectURL(file);

});

generateBtn.addEventListener("click", function(){

if(fileInput.files.length === 0){
alert("Please upload a photo");
return;
}

const prompt =
document.getElementById("prompt").value.trim();

if(prompt === ""){
alert("Please describe your video");
return;
}

generateBtn.disabled = true;

const steps = [
"Analyzing photo...",
"Understanding prompt...",
"Preparing motion...",
"Generating video...",
"Finalizing result..."
];

let i = 0;

generateBtn.textContent = steps[i];

const timer = setInterval(function(){

i++;

if(i < steps.length){

generateBtn.textContent = steps[i];

}else{

clearInterval(timer);

generateBtn.textContent =
"Video Generation Completed";

generateBtn.disabled = false;

}

},1500);

});

</script>

</body>
</html>
