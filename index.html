<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VEXORA AI</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#ffffff;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.container{
width:100%;
max-width:700px;
}

.logo{
text-align:center;
font-size:36px;
font-weight:800;
margin-bottom:8px;
color:#111827;
}

.sub{
text-align:center;
color:#6b7280;
margin-bottom:30px;
font-size:15px;
}

.chatbox{
background:#ffffff;
border:1px solid #e5e7eb;
border-radius:24px;
padding:18px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}

textarea{
width:100%;
border:none;
outline:none;
resize:none;
min-height:100px;
font-size:16px;
padding:10px;
}

.settings-panel{
display:none;
margin-top:15px;
padding:15px;
border:1px solid #e5e7eb;
border-radius:16px;
background:#fafafa;
}

.setting-group{
margin-bottom:15px;
}

.setting-title{
font-size:14px;
font-weight:700;
margin-bottom:10px;
color:#111827;
}

.option-btn{
border:none;
padding:8px 12px;
margin:4px;
border-radius:10px;
background:#e5e7eb;
cursor:pointer;
font-size:14px;
}

.option-btn.active{
background:#2563eb;
color:white;
}
.controls{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:12px;
}

.left-buttons{
display:flex;
gap:10px;
}

.upload-btn,
.settings-btn{
width:48px;
height:48px;
border:none;
border-radius:50%;
background:#f3f4f6;
font-size:22px;
cursor:pointer;
transition:.2s;
}

.upload-btn:hover,
.settings-btn:hover{
background:#2563eb;
color:white;
}

.generate-btn{
border:none;
padding:12px 22px;
border-radius:14px;
background:#2563eb;
color:white;
font-weight:bold;
cursor:pointer;
}

.preview{
display:none;
margin-top:15px;
}

.preview img{
width:100%;
max-height:260px;
object-fit:cover;
border-radius:16px;
}

.footer{
text-align:center;
margin-top:20px;
color:#777;
font-size:13px;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">VEXORA AI</div>

<div class="sub">
Create realistic AI videos from photos
</div>

<div class="chatbox">

<textarea
id="prompt"
placeholder="Describe your video..."></textarea>

<div
class="settings-panel"
id="settingsPanel">

<div class="setting-group">

<div class="setting-title">
Duration
</div>

<button class="option-btn active">4s</button>
<button class="option-btn">5s</button>
<button class="option-btn">6s</button>
<button class="option-btn">7s</button>
<button class="option-btn">8s</button>

</div>

<div class="setting-group">

<div class="setting-title">
Quality
</div>

<button class="option-btn">360p</button>
<button class="option-btn">480p</button>
<button class="option-btn active">720p HD</button>
<button class="option-btn">1080p Full HD</button>
<button class="option-btn">1440p QHD</button>
<button class="option-btn">2160p 4K</button>

</div>

</div>
<input
type="file"
id="fileInput"
hidden
accept="image/*">

<div class="controls">

<div class="left-buttons">

<button
class="upload-btn"
onclick="document.getElementById('fileInput').click()">
+
</button>

<button
class="settings-btn"
id="settingsBtn">
⚙
</button>

</div>

<button
class="generate-btn"
id="generateBtn">
Generate
</button>

</div>

<div
class="preview"
id="preview">

<img id="previewImg">

</div>

</div>

<div class="footer">
VEXORA AI Video Generator
</div>

</div>

<script>

const fileInput =
document.getElementById("fileInput");

const preview =
document.getElementById("preview");

const previewImg =
document.getElementById("previewImg");

const generateBtn =
document.getElementById("generateBtn");

const settingsBtn =
document.getElementById("settingsBtn");

const settingsPanel =
document.getElementById("settingsPanel");

fileInput.addEventListener("change", function(){

const file = this.files[0];

if(!file) return;

preview.style.display = "block";
previewImg.src = URL.createObjectURL(file);

});

settingsBtn.addEventListener("click", function(){

if(settingsPanel.style.display === "block"){
settingsPanel.style.display = "none";
}else{
settingsPanel.style.display = "block";
}

});

/* Duration group */
const durationButtons =
document.querySelectorAll(
".setting-group:nth-child(1) .option-btn"
);

durationButtons.forEach(btn=>{

btn.addEventListener("click", function(){

durationButtons.forEach(b=>
b.classList.remove("active")
);

this.classList.add("active");

});

});

/* Quality group */
const qualityButtons =
document.querySelectorAll(
".setting-group:nth-child(2) .option-btn"
);

qualityButtons.forEach(btn=>{

btn.addEventListener("click", function(){

qualityButtons.forEach(b=>
b.classList.remove("active")
);

this.classList.add("active");

});

});

generateBtn.addEventListener("click", function(){

if(fileInput.files.length === 0){
alert("Please upload a photo");
return;
}

const prompt =
document.getElementById("prompt").value.trim();

if(prompt === ""){
alert("Please describe your video");
return;
}

generateBtn.disabled = true;

const steps = [
"Analyzing photo...",
"Understanding prompt...",
"Preparing motion...",
"Generating video...",
"Finalizing result..."
];

let i = 0;

generateBtn.textContent = steps[i];

const timer = setInterval(function(){

i++;

if(i < steps.length){

generateBtn.textContent = steps[i];

}else{

clearInterval(timer);

generateBtn.textContent =
"Video Generation Completed";

generateBtn.disabled = false;

}

},1500);

});

</script>

</body>
    </html>
