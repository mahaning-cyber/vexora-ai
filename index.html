<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VEXORA AI</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,Arial,sans-serif;
}

body{
background:#ffffff;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.container{
width:100%;
max-width:700px;
}

.logo{
text-align:center;
font-size:32px;
font-weight:800;
letter-spacing:1px;
margin-bottom:10px;
}

.sub{
text-align:center;
color:#666;
margin-bottom:40px;
font-size:15px;
}

.chatbox{
width:100%;
background:#fff;
border:1px solid #e4e4e4;
border-radius:28px;
padding:12px;
box-shadow:0 8px 30px rgba(0,0,0,.08);
}

textarea{
width:100%;
border:none;
outline:none;
resize:none;
font-size:16px;
padding:12px;
min-height:80px;
}

.bottom{
display:flex;
align-items:center;
justify-content:space-between;
gap:10px;
margin-top:10px;
}

.left{
display:flex;
align-items:center;
gap:10px;
}

.upload-btn{
width:48px;
height:48px;
border:none;
border-radius:50%;
background:#f3f4f6;
font-size:24px;
cursor:pointer;
transition:.2s;
}

.upload-btn:hover{
transform:scale(1.05);
}

.generate-btn{
border:none;
padding:12px 22px;
border-radius:14px;
background:#2563eb;
color:#fff;
font-size:15px;
font-weight:600;
cursor:pointer;
transition:.2s;
}

.generate-btn:hover{
transform:translateY(-1px);
}

.preview{
margin-top:15px;
display:none;
}

.preview img{
width:100%;
max-height:250px;
object-fit:cover;
border-radius:18px;
border:1px solid #eee;
}

.footer{
text-align:center;
margin-top:25px;
color:#777;
font-size:13px;
}

@media(max-width:600px){

.logo{
font-size:26px;
}

.chatbox{
border-radius:22px;
}

.generate-btn{
padding:12px 18px;
font-size:14px;
}

textarea{
font-size:15px;
}

}

</style>
</head>

<body>

<div class="container">

<div class="logo">VEXORA AI</div>

<div class="sub">
Create realistic AI videos from photos
</div>

<div class="chatbox">

<textarea placeholder="Describe your video..."></textarea>

<div class="bottom">

<div class="left">

<input
type="file"
id="fileInput"
hidden
accept="image/*"
>

<button
class="upload-btn"
onclick="document.getElementById('fileInput').click()">
+
</button>

</div>

<button class="generate-btn">
Generate
</button>

</div>

<div class="preview" id="preview">
<img id="previewImg">
</div>

</div>

<div class="footer">
VEXORA AI Video Generator
</div>

</div>

<script>

const fileInput =
document.getElementById('fileInput');

const preview =
document.getElementById('preview');

const previewImg =
document.getElementById('previewImg');

fileInput.addEventListener('change',e=>{

const file=e.target.files[0];

if(!file) return;

preview.style.display='block';

previewImg.src=
URL.createObjectURL(file);

});

</script>

</body>
</html>
