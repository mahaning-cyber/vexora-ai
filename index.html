<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VEXORA AI</title>

<style>
:root{
    --bg:#f5f7fb;
    --card:#ffffff;
    --text:#111827;
    --muted:#6b7280;
    --border:#e5e7eb;
    --primary:#2563eb;
    --primary2:#3b82f6;
    --shadow:0 10px 30px rgba(0,0,0,.08);
    --radius:20px;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    font-family:Inter,Segoe UI,Roboto,Arial,sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
}

.container{
    width:100%;
    max-width:900px;
    margin:auto;
    padding:16px;
}

.header{
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px 0;
}

.logo{
    font-size:28px;
    font-weight:800;
    letter-spacing:1px;
}

.logo span{
    color:var(--primary);
}

.card{
    background:var(--card);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    padding:18px;
    border:1px solid var(--border);
}

.textarea{
    width:100%;
    min-height:180px;
    resize:none;
    border:none;
    outline:none;
    font-size:16px;
    background:transparent;
    color:var(--text);
    line-height:1.6;
}

.actions{
    display:flex;
    gap:10px;
    margin-top:15px;
    align-items:center;
    flex-wrap:wrap;
}

.icon-btn{
    width:48px;
    height:48px;
    border:none;
    border-radius:14px;
    cursor:pointer;
    background:#f3f4f6;
    font-size:22px;
    transition:.2s;
}

.icon-btn:hover{
    transform:translateY(-2px);
}

.generate-btn{
    flex:1;
    min-height:48px;
    border:none;
    cursor:pointer;
    border-radius:14px;
    color:#fff;
    font-weight:700;
    font-size:15px;
    background:linear-gradient(135deg,#2563eb,#60a5fa);
    transition:.25s;
}

.generate-btn:hover{
    transform:translateY(-2px);
}

.settings-panel{
    display:none;
    margin-top:16px;
    animation:fade .25s ease;
}

.settings-panel.active{
    display:block;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(-8px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.section{
    margin-bottom:20px;
}

.section-title{
    font-size:15px;
    font-weight:700;
    margin-bottom:10px;
}

.options{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
}

.option{
    border:1px solid var(--border);
    background:#fff;
    padding:10px 14px;
    border-radius:12px;
    cursor:pointer;
    transition:.2s;
    font-size:14px;
}

.option.active{
    background:#2563eb;
    color:#fff;
    border-color:#2563eb;
}

.preview-box{
    margin-top:15px;
    display:none;
}

.preview-box.show{
    display:block;
}

.preview-wrapper{
    position:relative;
    width:100%;
}

.preview-image{
    width:100%;
    max-height:300px;
    object-fit:cover;
    border-radius:16px;
    border:1px solid var(--border);
}

.remove-btn{
    position:absolute;
    top:10px;
    right:10px;
    border:none;
    width:38px;
    height:38px;
    border-radius:50%;
    background:#ef4444;
    color:#fff;
    cursor:pointer;
    font-size:18px;
}

.info{
    margin-top:16px;
    color:var(--muted);
    font-size:13px;
    text-align:center;
}

.footer{
    padding:25px 0;
    text-align:center;
    color:var(--muted);
    font-size:13px;
}

@media (max-width:600px){
    .logo{
        font-size:24px;
    }

    .textarea{
        min-height:150px;
    }

    .generate-btn{
        width:100%;
        flex:none;
    }
}
</style>
</head>
<body>

<div class="container">

    <div class="header">
        <div class="logo">VEXORA <span>AI</span></div>
    </div>

    <div class="card">

        <textarea
            id="prompt"
            class="textarea"
            placeholder="Describe the video you want to generate..."
        ></textarea>

        <div class="preview-box" id="previewBox">
            <div class="preview-wrapper">
                <img id="previewImage" class="preview-image" alt="Preview">
                <button class="remove-btn" id="removeImage">✕</button>
            </div>
        </div>

        <div class="actions">

            <input type="file" id="imageInput" accept="image/*" hidden>

            <button class="icon-btn" id="uploadBtn">+</button>

            <button class="icon-btn" id="settingsBtn">⚙</button>

            <button class="generate-btn" id="generateBtn">
                Generate Video
            </button>

        </div>

        <div class="settings-panel" id="settingsPanel">

            <div class="section">

                <div class="section-title">Duration</div>

                <div class="options single-group" data-group="duration">
                    <button class="option active">4s</button>
                    <button class="option">5s</button>
                    <button class="option">6s</button>
                    <button class="option">7s</button>
                    <button class="option">8s</button>
                </div>

            </div>

            <div class="section">

                <div class="section-title">Video Size</div>

                <div class="options single-group" data-group="size">
                    <button class="option active">Auto</button>
                    <button class="option">9:16 Shorts (1080×1920)</button>
                    <button class="option">16:9 YouTube (1920×1080)</button>
                    <button class="option">1:1 Square (1080×1080)</button>
                </div>

            </div>

            <div class="section">

                <div class="section-title">Quality</div>

                <div class="options single-group" data-group="quality">
                    <button class="option">360p</button>
                    <button class="option">480p</button>
                    <button class="option active">720p HD</button>
                    <button class="option">1080p Full HD</button>
                    <button class="option">1440p QHD</button>
                    <button class="option">2160p 4K</button>
                </div>

            </div>

        </div>

        <div class="info">
            Optimized for mobile devices • Lightweight • Fast UI
        </div>

    </div>

    <div class="footer">
        © 2026 VEXORA AI
    </div>

</div>

<script>
const settingsBtn = document.getElementById("settingsBtn");
const settingsPanel = document.getElementById("settingsPanel");

settingsBtn.addEventListener("click", () => {
    settingsPanel.classList.toggle("active");
});

document.querySelectorAll(".single-group").forEach(group => {

    const options = group.querySelectorAll(".option");

    options.forEach(btn => {

        btn.addEventListener("click", () => {

            options.forEach(o => o.classList.remove("active"));

            btn.classList.add("active");

        });

    });

});

const imageInput = document.getElementById("imageInput");
const uploadBtn = document.getElementById("uploadBtn");
const previewBox = document.getElementById("previewBox");
const previewImage = document.getElementById("previewImage");
const removeImage = document.getElementById("removeImage");

uploadBtn.addEventListener("click", () => {
    imageInput.click();
});

imageInput.addEventListener("change", e => {

    const file = e.target.files[0];

    if(!file) return;

    const reader = new FileReader();

    reader.onload = function(event){

        previewImage.src = event.target.result;

        previewBox.classList.add("show");

    };

    reader.readAsDataURL(file);

});

removeImage.addEventListener("click", () => {

    imageInput.value = "";

    previewImage.src = "";

    previewBox.classList.remove("show");

});

function getSelected(groupName){

    const group = document.querySelector(
        '.single-group[data-group="' + groupName + '"]'
    );

    return group.querySelector(".active").textContent.trim();

}

document.getElementById("generateBtn")
.addEventListener("click", () => {

    const prompt =
        document.getElementById("prompt").value.trim();

    const duration = getSelected("duration");
    const size = getSelected("size");
    const quality = getSelected("quality");

    const data = {
        prompt,
        duration,
        size,
        quality,
        imageUploaded:
            previewBox.classList.contains("show")
    };

    console.clear();
    console.log("VEXORA AI Request");
    console.log(data);

    alert(
        "Generate Clicked\\n\\n" +
        "Duration: " + duration + "\\n" +
        "Size: " + size + "\\n" +
        "Quality: " + quality
    );

});
</script>

</body>
          </html>
